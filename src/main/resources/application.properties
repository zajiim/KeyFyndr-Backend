spring.application.name=keyfyndr-backend

# Disable Docker Compose auto-start (run services locally instead)
spring.docker.compose.enabled=false

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
# Override with env vars: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
# 'validate' — Hibernate checks schema matches entities but never creates/alters.
# Flyway owns all schema changes via versioned migrations.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Redis ───────────────────────────────────────────────────────────────────
# Override with env vars: REDIS_HOST, REDIS_PORT
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Override with env var: JWT_SECRET (must be a Base64-encoded 256-bit key)
app.jwt.secret=${JWT_SECRET:CHANGE_ME_SET_JWT_SECRET_ENV_VAR}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: lets Flyway adopt an existing DB (tables already created by Hibernate)
spring.flyway.baseline-on-migrate=true
# baseline-version=0 means V1 and above will still run after baselining
spring.flyway.baseline-version=0

# ─── Server ──────────────────────────────────────────────────────────────────
server.address=0.0.0.0

# ─── Firebase Cloud Messaging (FCM) ──────────────────────────────────────────
# Option A (local dev): place service-account.json in src/main/resources/
#   → The file is gitignored — never commit it.
# Option B (production): set GOOGLE_APPLICATION_CREDENTIALS env var to the
#   absolute path of the JSON file on the server, then set this property to empty.
app.fcm.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:service-account.json}

# ─── Mapbox Static Images API ────────────────────────────────────────────────
# Set MAPBOX_API env var to your Mapbox access token (starts with pk.)
# Never commit the real token — set it via environment variable only.
app.mapbox.access-token=${MAPBOX_API:}
# Mapbox style IDs for light and dark themes
app.mapbox.style-light=mapbox/light-v11
app.mapbox.style-dark=mapbox/dark-v11
# Output image dimensions (width x height in pixels)
app.mapbox.image-width=700
app.mapbox.image-height=400
# Append @2x for high-DPI (retina) image — doubles pixel density
app.mapbox.retina=true
# Nearby keys search radius in meters (5 km)
app.mapbox.nearby-radius-meters=5000.0
# Max markers included in the Mapbox URL overlay (URL length guard)
app.mapbox.max-overlay-markers=20

# ─── Map Rate Limiting (Redis-backed) ────────────────────────────────────────
# Max number of map-preview image requests per authenticated user per minute
app.map.rate-limit.requests-per-minute=20
spring.config.import=optional:classpath:application-local.properties

